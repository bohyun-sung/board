server:
  port: 8090
  forward-headers-strategy: native

spring:

  jpa:
    hibernate:
      naming:
        physical-strategy: org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
      ddl-auto: none
      dialect: org.hibernate.dialect.MariaDBDialect

    properties:
      hibernate:
        format_sql: true
        highlight_sql: true         # SQL에 색상 부여 (터미널에서 가독성 향상)
        use_sql_comments: true      # 쿼리에 주석 추가

    show-sql: false

  # Message settings
  messages:
    basename: messages
    encoding: UTF-8
    fallback-to-system-locale: false

  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 50MB

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
    display-request-duration: true
  server:
    url: https://bohyun-board.duckdns.org
    description: Production Server

logbook:
  filter:
    enabled: false

logging:
  level:
    root: info # 전체 기본값은 info로 유지 (시스템 안정성)
    com.toyproject.board: info # 내 프로젝트 로직은 info 이상만 (에러나 주요 흐름 확인)

    # DB 관련: 쿼리는 보고 싶되, 데이터 값(bind)은 제외하여 보안/성능 유지
    org.hibernate.SQL: debug # 실행되는 SQL 쿼리문은 확인 가능
    org.hibernate.type.descriptor.sql.BasicBinder: warn # 쿼리 파라미터 값(bind)은 노출 안 함 (보안)
    org.hibernate.orm.jdbc.bind: warn # Hibernate 6 이상용 파라미터 로그 비활성화

    # 커넥션 풀: 초기화 시점에만 디버그 정보를 확인하고 평소엔 잠잠하게
    com.zaxxer.hikari: info

    # 보안 및 기타 라이브러리: 평소엔 info, 장애 발생 시에만 debug로 변경 권장
    org.springframework.security: info
    org.zalando.logbook: debug

app:
  security:
    url:
      whitelist:
        - "/v3/api-docs/**"
        - "/swagger-ui/**"
        - "/swagger-ui.html"
        - "/swagger-resources/**"
        - "/webjars/**"
        - "/favicon.ico"
        - "/error"
        - "/login/oauth2/**"
      post-whitelist:
        - "/api/auth/login/admin"
        - "/api/auth/login/member"
        - "/api/auth/create/admin"
        - "/api/auth/create/member"

      get-whitelist:
        - "/api/posts/**"

  callback:
    url: "https://bohyun-board.duckdns.org/oauth-callback"